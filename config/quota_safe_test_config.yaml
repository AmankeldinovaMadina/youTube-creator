project_name: higgsfield_creator_scoring_quota_safe_test
results_per_query: 1
recent_videos_to_check: 2
recent_comments_per_video: 0
use_comment_analysis: false
include_channel_search: false
min_subscribers: 5000
max_total_candidates: 1
max_candidates_per_category: 1
search_order: sequential
max_retries: 1
retry_backoff_seconds: 1

audience_signal_threshold_high: 8
workflow_signal_threshold_high: 6
comment_tool_intent_threshold_high: 8
uploads_30d_consistency_threshold: 2

weights:
  audience_fit: 3
  monetization_focus: 2
  tool_relevance: 2
  engagement_quality: 2
  posting_frequency: 1

