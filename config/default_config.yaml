fit_label_rules:
  strong_fit:
    min_audience_fit_score: 2.0
    min_higgsfield_specific_fit_score: 2.0
    min_demoability_score: 1.0
    any_of:
      - monetization_focus_score >= 1.5
      - product_feature_signal_count >= 6
      - creative_replication_comment_count >= 5
      - premium_aesthetic_signal_count >= 5

  medium_fit:
    min_audience_fit_score: 1.5
    min_higgsfield_specific_fit_score: 1.0

  weak_fit:
    max_audience_fit_score: 1.0
    or_conditions:
      - higgsfield_specific_fit_score == 0
      - demoability_score == 0
      - premium_aesthetic_fit_score == 0

  disqualify:
    any_of:
      - broad_entertainment_penalty_applies
      - low_visual_relevance_penalty_applies
      - no_meaningful_recent_activity
      - unrelated_to_creator_or_visual_workflow

affinity_scoring:
  cinema_studio_affinity:
    source_dictionary: cinema_studio
    score_range: [0, 3]

  soul_affinity:
    source_dictionary: soul
    score_range: [0, 3]

  soul_id_affinity:
    source_dictionary: soul_id
    score_range: [0, 3]

  soul_hex_affinity:
    source_dictionary: soul_hex
    score_range: [0, 3]

  soul_moodboard_affinity:
    source_dictionary: soul_moodboard
    score_range: [0, 3]

  camera_control_affinity:
    source_dictionary: camera_control
    score_range: [0, 3]

  transitions_affinity:
    source_dictionary: transitions
    score_range: [0, 3]

  higgsfield_audio_affinity:
    source_dictionary: higgsfield_audio
    score_range: [0, 3]

ranking_formula:
  base_score: >
    (audience_fit_score * 2.5) +
    (monetization_focus_score * 1.5) +
    (generic_tool_relevance_score * 1.0) +
    (higgsfield_specific_fit_score * 2.5) +
    (engagement_quality_score * 1.5) +
    (posting_frequency_score * 0.75) +
    (demoability_score * 1.5) +
    (premium_aesthetic_fit_score * 1.5)

  bonus_score_components:
    - mid_tier_bonus
    - view_health_bonus
    - workflow_bonus
    - consistency_bonus
    - feature_match_bonus
    - creative_direction_bonus

  penalty_score_components:
    - generic_ai_novelty_penalty
    - broad_entertainment_penalty
    - low_visual_relevance_penalty
    - weak_demoability_penalty
    - inflated_subscriber_penalty
    - inactive_penalty

  normalized_score_formula: >
    min(10, max(0, base_score + bonus_score - penalty_score))

priority_tiers:
  A:
    min_score: 8.5
  B:
    min_score: 7.0
    max_score: 8.49
  C:
    min_score: 5.5
    max_score: 6.99
  D:
    max_score: 5.49

commentary_generation:
  include_fields:
    - audience_type_summary
    - why_higgsfield_fits
    - strongest_feature_matches
    - recommended_higgsfield_angle
    - buyer_intent_summary
  max_sentences: 3

sorting:
  primary:
    - normalized_score: desc
  tie_breakers:
    - fit_label: desc
    - avg_views_recent_10: desc
    - creative_replication_comment_count: desc
    - uploads_last_30_days: desc