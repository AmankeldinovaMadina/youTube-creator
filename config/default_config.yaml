project_name: higgsfield_creator_scoring

results_per_query: 15
recent_videos_to_check: 8
recent_comments_per_video: 15
use_comment_analysis: false
include_channel_search: false
min_subscribers: 2000
max_total_candidates: 700
max_candidates_per_category: 200
search_order: sequential
max_retries: 3
retry_backoff_seconds: 2

audience_signal_threshold_high: 8
workflow_signal_threshold_high: 6
comment_tool_intent_threshold_high: 8
uploads_30d_consistency_threshold: 4

product_feature_signal_threshold_high: 6
creative_replication_comment_threshold_high: 5
premium_aesthetic_signal_threshold_high: 5
demoability_threshold_high: 4

weights:
