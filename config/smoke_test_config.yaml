project_name: higgsfield_creator_scoring_smoke
results_per_query: 3
recent_videos_to_check: 3
recent_comments_per_video: 0
use_comment_analysis: false
include_channel_search: true
min_subscribers: 5000
max_total_candidates: 20
max_candidates_per_category: 10
search_order: sequential
max_retries: 2
retry_backoff_seconds: 1

audience_signal_threshold_high: 8
workflow_signal_threshold_high: 4
comment_tool_intent_threshold_high: 3
uploads_30d_consistency_threshold: 2

weights:
  audience_fit: 3
  monetization_focus: 2
  tool_relevance: 2
  engagement_quality: 2
  posting_frequency: 1

bonuses:
  mid_tier_bonus: 1.0
  view_health_bonus: 0.5
  workflow_bonus: 0.5
  consistency_bonus: 0.5

penalties:
  curiosity_penalty: 1.0
  broad_entertainment_penalty: 1.0
  inflated_subscriber_penalty: 0.5
  inactive_penalty: 0.5

keyword_dictionaries:
  audience_fit:
    - creator
    - content creator
    - freelancer
    - agency
    - marketer
    - personal brand
  monetization:
    - monetization
    - make money
    - revenue
    - income
    - sponsorship
    - business
  workflow:
    - workflow
    - system
    - process
    - batching
    - pipeline
    - production
  tool_relevance:
    - tool
    - software
    - app
    - plugin
    - creator tools
    - editing software
  tool_buying_intent_comments:
    - what tool do you use
    - what software do you use
  creator_intent_comments:
    - i started my channel
    - trying to grow my channel
  business_intent_comments:
    - make money from content
    - monetize my channel

categories:
  - name: YouTube Growth Experts
    weight: 1.0
    queries:
      - youtube growth strategy
    keywords:
      - growth
      - retention
      - thumbnails
    negative_keywords:
      - music video
      - reaction

  - name: Workflow Optimizers
    weight: 1.2
    queries:
      - content pipeline for creators
    keywords:
      - content systems
      - batching
      - productivity
    negative_keywords: []
